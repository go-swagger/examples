swagger: "2.0"
info:
  description: Example server uploading a file
  version: "1.0.0"
  title: File Upload
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json

paths:
  # snippet:upload-path
  /upload:
    post:
      tags:
      - uploads
      summary: uploads
      operationId: uploadFile
      consumes:
      - multipart/form-data
      parameters:
      - name: file
        in: formData
        type: file
        required: true
        x-go-server-streaming: true
  # endsnippet:upload-path
      responses:
        "200":
          description: OK
