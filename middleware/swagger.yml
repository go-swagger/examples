---
swagger: "2.0"
info:
  title: greeter
  description: |
    Minimal API used to demonstrate how to plug custom net/http middleware
    into a server generated by go-swagger.
  version: 0.1.0
schemes:
  - http
basePath: /api
consumes:
  - application/json
produces:
  - application/json
paths:
  /greet:
    get:
      tags: [greeter]
      operationId: greet
      summary: Return a default greeting.
      responses:
        "200":
          description: greeting
          schema:
            $ref: "#/definitions/greeting"
        default:
          description: error
          schema:
            $ref: "#/definitions/error"
  /greet/{name}:
    get:
      tags: [greeter]
      operationId: greetName
      summary: Return a greeting addressed to the caller.
      parameters:
        - name: name
          in: path
          required: true
          type: string
      responses:
        "200":
          description: greeting
          schema:
            $ref: "#/definitions/greeting"
        default:
          description: error
          schema:
            $ref: "#/definitions/error"
definitions:
  greeting:
    type: object
    required:
      - message
    properties:
      message:
        type: string
  error:
    type: object
    required:
      - message
    properties:
      code:
        type: integer
        format: int64
      message:
        type: string
