baseURL: https://goswagger.io/examples/
title: go-swagger examples
theme: hugo-relearn
languageCode: en-us

# Enable features
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: true

# Content configuration
contentDir: content

# Output formats
outputs:
  home:
    - html
    - rss
    - print

# Markup configuration
markup:
  goldmark:
    renderer:
      unsafe: true  # Allow raw HTML in markdown
    parser:
      attribute:
        title: true
        block: true
    renderHooks:
      image:
        useEmbedded: always
  highlight:
    codeFences: true
    guessSyntax: false
    lineNos: false
    lineNumbersInTable: false
    noClasses: true
    style: monokai
    tabWidth: 4

# Taxonomies are disabled for now
disableKinds:
  - taxonomy
  - term
# Module mounts
# Following go-swagger pattern: simple mounts for content and assets
module:
  mounts:
    # Custom layouts (override theme if needed)
    - source: layouts
      target: layouts

    # Generated documentation content
    - source: '../../../docs/doc-site'
      target: content

    # Real, committed example projects surfaced via the `code` shortcode.
    # Unlike sibling sites, this repo *is* the examples: we mount the project
    # root so pages embed the actual generated/hand-written source. The mounted
    # path is root-relative, so it matches the file's true path on GitHub — the
    # `code` shortcode's source link uses `examplesSourcePrefix` (empty here).
    # includeFiles/excludeFiles are the real Hugo mount keys; excludeFiles keeps
    # worktrees, the doc-site tooling and VCS metadata out of the asset graph.
    - source: '../../..'
      target: assets/examples
      includeFiles:
        - '**/*.go'
        - '**/*.json'
        - '**/*.yaml'
        - '**/*.yml'
      excludeFiles:
        - '.git/**'
        - '.worktrees/**'
        - 'hack/**'
        - 'docs/**'
        - '**/vendor/**'

    # Custom SCSS (for theme customization) + logo
    - source: themes/examples-assets
      target: assets

    # Custom static files (favicon)
    - source: themes/examples-static
      target: static

# Relearn theme parameters
params:
  editURL: 'https://github.com/go-swagger/examples/edit/master/'
  externalLinkTarget: _blank

  # Repository info
  sourceRepository: 'https://github.com/go-swagger/examples'

  # Path prefix prepended to a `code` shortcode `file` when building the GitHub
  # "Full source" link. Runtime keeps examples under docs/examples/; here the
  # examples ARE the repo, mounted from the root, so the prefix is empty.
  examplesSourcePrefix: ''

  # Branding
  author:
    name: 'go-openapi maintainers'
  hideAuthorEmail: true

  # Theme customization
  themeVariant:
    - zen-dark
    - relearn-dark
    - relearn-light
  showVisitedLinks: true
  collapsibleMenu: true
  disableBreadcrumb: false
  disableNextPrev: false
  disableLandingPageButton: true
  titleSeparator: '|'

  # Features
  search:
    disable: false
    index:
      disable: false
    page:
      disable: false
    adapter:
      identifier: lunr
  disableLanguageSwitchingButton: true
  disableInlineCopyToClipBoard: false

  # Menu ordering
  ordersectionsby: 'weight'
  # Proposal for enhancement: configure versions
  #versions:
  #- baseURL: https://goswagger.io/examples/
  #  identifier: v2.1.0
  #  isLatest: true
  #version: 'v2.1.0'

  # Custom params
  examples:
    goVersion: ''
    latestRelease: ''
    versionMessage: ''
    buildTime: ''

# Menu configuration
menu:
  shortcuts:
    - name: "GitHub"
      identifier: github
      url: "https://github.com/go-swagger/examples"
      weight: 10

    - name: "go-openapi toolkit"
      identifier: go-openapi
      url: "https://github.com/go-openapi"
      weight: 20

# Privacy settings
privacy:
  disqus:
    disable: true
  googleAnalytics:
    disable: true
