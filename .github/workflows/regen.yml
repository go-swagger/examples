name: Regenerate examples

permissions:
  contents: read

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 06:00 UTC
  workflow_dispatch:

jobs:
  regen:
    name: regenerate examples
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Configure bot credentials
        uses: go-openapi/gh-actions/ci-jobs/bot-credentials@1ade8c4f9415b844bec4a7545967157c5bace961 # v1.4.12
        id: bot-credentials
        with:
          enable-github-app: "true"
          github-app-id: ${{ secrets.CI_BOT_APP_ID }}
          github-app-private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}
          enable-gpg-signing: "true"
          gpg-private-key: ${{ secrets.CI_BOT_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.CI_BOT_GPG_PASSPHRASE }}
          gpg-fingerprint: ${{ secrets.CI_BOT_SIGNING_KEY }}
          enable-commit-signing: "true"
          enable-tag-signing: "false"
      -
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
          cache: true
      -
        name: Install swagger CLI
        run: go install github.com/go-swagger/go-swagger/cmd/swagger@master
      -
        name: Regenerate examples
        run: hack/regen-samples.sh
      -
        name: Build check
        run: |
          go build ./...
          # empty tests for now, yet stronger check than just go build
          go test ./...
      -
        name: Create or update PR
        id: create-pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.bot-credentials.outputs.app-token }}
          commit-message: "chore: regenerate examples from go-swagger@master"
          branch: regen/scheduled
          delete-branch: true
          title: "chore: regenerate examples from latest go-swagger"
          body: |
            Scheduled regeneration using `swagger@master`.

            Review the diff to confirm generated changes are expected.
          labels: "bot"
          draft: false
          assignees: fredbi
          reviewers: fredbi
          sign-commits: true
          signoff: true
